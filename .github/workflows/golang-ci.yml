name: Golang CI

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/golang-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'server/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/golang-ci.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: |
          go test -v -race ./...
