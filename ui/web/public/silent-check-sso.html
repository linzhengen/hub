<!DOCTYPE html>
<html>
  <head>
    <title>Silent Check SSO</title>
    <script>
      // This page is used for silent check-sso
      // Keycloak will redirect here after checking authentication status
      // The parent window will receive the message
      window.addEventListener('DOMContentLoaded', function() {
        window.parent.postMessage(window.location.href, window.location.origin);
      });
    </script>
  </head>
  <body>
    <!-- Silent check SSO page -->
  </body>
</html>
