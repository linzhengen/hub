apiVersion: batch/v1
kind: Job
metadata:
  name: terraform-apply
  namespace: keycloak
spec:
  # 完了後に Job を自動削除することで、次回のデプロイ時に再作成・再実行されるようにします
  ttlSecondsAfterFinished: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: terraform-state
        - name: config-minikube
          configMap:
            name: terraform-config-minikube
        - name: config-modules
          configMap:
            name: terraform-config-modules
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              until nc -z keycloak.keycloak.svc.cluster.local 80; do
                echo "waiting for keycloak..."
                sleep 5
              done
              echo "keycloak is ready"
        - name: copy-config
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /workspace/minikube /workspace/modules/keycloak
              cp /config-minikube/* /workspace/minikube/ 2>/dev/null || true
              cp /config-modules/* /workspace/modules/keycloak/ 2>/dev/null || true
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: config-minikube
              mountPath: /config-minikube
            - name: config-modules
              mountPath: /config-modules
      containers:
        - name: terraform
          image: hashicorp/terraform:1.14
          workingDir: /workspace/minikube
          command: ['sh', '-c']
          args:
            - terraform init && terraform apply -auto-approve
          envFrom:
            - secretRef:
                name: terraform-secret
          volumeMounts:
            - name: workspace
              mountPath: /workspace
