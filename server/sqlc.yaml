version: "2"
sql:
  - schema: "db/migrations/postgres"
    queries: "internal/infrastructure/persistence/postgres/query/"
    engine: "postgresql"
    rules:
      - sqlc/db-prepare
    gen:
      go:
        out: "internal/infrastructure/persistence/postgres/sqlc"
        emit_result_struct_pointers: true
        emit_interface: true
        emit_empty_slices: true
