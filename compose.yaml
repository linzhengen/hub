services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password#123
      POSTGRES_DB: hub
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./tmp/postgres/data:/var/lib/postgresql/data
      - ./tmp/postgres/logs:/var/log/postgresql
    ports:
      - "5432:5432"
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_rotation_size=10MB
  hub:
    image: cosmtrek/air:v1.65.1
    working_dir: /src
    volumes:
      - ./:/src
    env_file:
      - server/.env.local
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command:
      - start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_HEALTH_ENABLED: "true"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9000; printf 'GET /health/live HTTP/1.0\\r\\n\\r\\n' >&3; grep '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8080:8080"
    volumes:
      - ./ui/keycloak-theme/themes:/opt/keycloak/themes
